build:
    environment:
        php:
            version: '8.4'
    nodes:
        analysis:
            dependencies:
                override:
                    - composer install --no-interaction --prefer-dist --no-progress
            tests:
                override:
                    # Skip the bundled php-scrutinizer-run static analyzer.
                    # It does not fully support PHP 8.4 syntax used in this package
                    # (readonly classes, typed class constants). The repo's actual
                    # quality gate is the GitHub Actions workflow (phpcs + phpunit).
                    - true

tools:
    external_code_coverage:
        timeout: 600

checks:
    php:
        code_rating: true
        duplication: true
