    ## Process
    - openspec-workflow: OpenSpec schema, artifact set, and generation rules for this project's spec-driven-longish workflow (mandatory summary.md for non-technical stakeholders, terminal commit-message suggestion lives on the summary artifact, apply-prerequisite enforcement)
    - ci-pipeline: GitLab CI conventions for this project; today covers the automated AI MR review (pr-agent on Anthropic / claude-opus-4-7, auto /review on every MR, line-anchored inline comments, CLAUDE.md threading, allow_failure, pinned image tag, parallel-rollout discipline)

    # OpenSpec workflow conventions
    - Scenarios use `#### Scenario:` (four hashtags) with `WHEN` / `THEN` lines.
    - Use `SHALL` / `MUST` for normative requirements.
    - Place new requirements under an existing capability when possible; justify
      creating a new capability in the proposal.
